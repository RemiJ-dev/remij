name: Deploy to server

on:
  workflow_dispatch: ~
  # Déclenché à la fin du workflow "Tests" pour un push sur main. Le job ne
  # s'exécute toutefois que si Tests a réussi (voir le `if` du job ci-dessous).
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
    branches:
      - main

# Un seul déploiement à la fois, et on ne coupe pas un déploiement en cours.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:

  deploy:
    name: '🚧  Build & deploy 🚀'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Déploie uniquement si le workflow Tests a réussi, ou en déclenchement manuel.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Setup PHP'
        uses: shivammathur/setup-php@v2
        with:
          coverage: "none"
          ini-values: "memory_limit=-1"
          php-version: "8.4"

      - name: 'Determine composer cache directory'
        id: composer-cache
        run: echo "dir=$(composer config cache-dir)" >> "$GITHUB_OUTPUT"

      - name: 'Cache composer dependencies'
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ hashFiles('composer.lock') }}

      # Deployer (vendor/bin/dep) est en require-dev : on installe les deps pour
      # disposer du binaire `dep`. Aucun build ici : assets + site statique sont
      # construits SUR LE SERVEUR par la tâche `update` de deploy.yaml
      # (make install@dist + make build@dist).
      - name: 'Install dependencies'
        run: composer install --no-progress --ansi

      # Charge la clé privée de déploiement dans ssh-agent.
      # forward_agent: true (deploy.yaml) => le serveur réutilise cet agent
      # transféré pour cloner le dépôt depuis GitHub.
      - name: 'Setup SSH agent'
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: 'Trust the deploy server host key'
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keyscan -H 193.70.90.143 >> ~/.ssh/known_hosts

      # make deploy = `php vendor/bin/dep deploy` ; PHP_CONT= force l'exécution
      # hors Docker (ubuntu-latest a docker, donc sans ça le Makefile passerait
      # par `docker compose exec php`).
      - name: '🚀 Deploy'
        run: make deploy PHP_CONT=

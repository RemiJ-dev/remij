server {
    listen 80;
    server_name remij.dev www.remij.dev;

    # Racine : site statique compilé par Stenope
    root /var/www/remij.dev/current/build;
    index index.html;

    # Route dynamique : GET + POST /contact → Symfony via PHP-FPM
    location = /contact {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/remij.dev/current/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /var/www/remij.dev/current/public;
        include fastcgi_params;
    }

    # Tout le reste : fichiers statiques
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}

server {
    listen 80;
    server_name remij.dev www.remij.dev;

    # Racine : site statique compilé par Stenope
    root /var/www/remij/build;
    index index.html;

    # Route dynamique : POST /contact → Symfony via PHP-FPM
    location = /contact {
        # Astuce : if+return (autorisé) → error_page → named location
        error_page 418 = @symfony_contact;

        if ($request_method = POST) {
            return 418;
        }

        # GET : servir le fichier statique
        try_files /contact/index.html =404;
    }

    # Named location : PHP-FPM → Symfony
    location @symfony_contact {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/remij/public/index.php;
        fastcgi_param DOCUMENT_ROOT   /var/www/remij/public;
        include fastcgi_params;
    }

    # Tout le reste : fichiers statiques
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}
<h1 id="doctrine-et-la-abbr-titlebase-de-donn%C3%A9esbddabbr">Doctrine et la <abbr title="Base de Données">BdD</abbr></h1>
<blockquote>
<p>Face caméra, avec les slides derrière</p>
</blockquote>
<p>Bonjour tout le monde,</p>
<p>Bienvenue sur DrakoLab, le laboratoire de Drakona.</p>
<p>Aujourd'hui, nous allons voir comment utiliser Doctrine pour manipuler une base de données (ou BdD pour faire plus court) dans un projet Symfony.</p>
<p>C'est une vidéo assez dense, où nous allons faire le tour du fonctionnement de Doctrine. Ce qui implique de comprendre :</p>
<ul>
<li>comment créer notre BdD</li>
<li>comment créer des tables</li>
<li>comment ajouter des entrées dans ces tables</li>
<li>et comment les récupérer</li>
</ul>
<p>Et vous allez voir qu'avec la couche d'abstraction que fournit Doctrine, tout cela nécessite de penser légèrement différemment, si vous n'avez pas l'habitude d'utiliser un ORM.</p>
<p>Il faut penser en termes d'objets <strong>uniquement</strong> et non plus en termes de BdD.</p>
<p>Après cette vidéo, vous ne m'entendrez d'ailleurs plus parler de BdD directement, mais toujours des entités, de leurs propriétés, etc.</p>
<p>J'insiste, tout passera par des classes et des objets. C'est ça le but d'un ORM : ne plus penser à la BdD.</p>
<p>Pour faire tout cela, nous allons passer par un ensemble d'objets et de commandes, que je vais vous détailler après quelques définitions.</p>
<h2 id="d%C3%A9finitions">Définitions</h2>
<p>Commençons directement par les gros mots et parlons de l'ORM.</p>
<p>Un ORM, pour Object Relational Mapping est un outil permettant de gérer une base de données sous forme d'objets.</p>
<p>Le but est de s'affranchir (autant que possible) des contraintes purement liées à la BdD pour se concentrer sur nos objets et avec, malgré tout, une BdD pour persister nos données.</p>
<p>Par exemple, on peut avoir une base de données aussi bien avec MySQL qu'avec PostGreSQL et, en théorie du moins, notre code sera identique, malgré les contraintes différentes de ces deux systèmes de gestion de base de données.</p>
<p>Le travail de l'ORM est donc, à partir de nos objets (qu'on va appeler Entités dans notre cas) de gérer la création, la modification, la suppression et la récupération des lignes de notre BdD.</p>
<p>Maintenant, Doctrine...</p>
<p>C'est un ensemble de librairies PHP (dont un ORM) permettant de manipuler notre base avec des objets, mais aussi de créer nos entités et des objets de manipulation.</p>
<p>J'insiste sur le fait que le travail de Doctrine est de nous permettre de nous concentrer sur notre code (le PHP) et réduire radicalement la gestion de la BdD elle-même.</p>
<p>Il vient aussi résoudre certains problèmes liés au travail d'équipe et à la base de données (on reparlera des migrations un peu plus tard) à travers plusieurs outils, ou outils annexes que l'on pourra ajouter.</p>
<h2 id="installation-et-principes">Installation et principes</h2>
<blockquote>
<p>PHPStorm uniquement</p>
</blockquote>
<p>Vous noterez que je vous fais installer 2 paquets un peu spéciaux :</p>
<ul>
<li>
<p>symfony/orm-pack, qui installe Doctrine, son intégration dans Symfony et quelques outils bien utiles pour utiliser Doctrine dans Symfony</p>
</li>
<li>
<p>symfony/maker-bundle, pour nous permettre de générer des classes qui vont nous être utiles.</p>
</li>
</ul>
<p>Notez qu'il est installé uniquement en mode de dev, ce n'est pas quelque chose que l'on veut en production, seulement quand on code.</p>
<p>Je me suis créé un projet vierge et minimal, mais vous verrez que ces deux paquets sont déjà installés sur notre projet de blog.</p>
<p>C'est parce que nous avons demandé à créer une webapp, avec la commande symfony new.</p>
<blockquote>
<p>Créer une entité, un repository et une migration pour l'exemple</p>
</blockquote>
<p>Maintenant, regardons un peu le fonctionnement général, et quels fichiers nous avons.</p>
<p>Tout d'abord, la configuration.</p>
<p>Dans <code>config/packages</code>, nous avons deux fichiers créés : doctrine.yaml et doctrine_migrations.yaml</p>
<p>Si vous avez regardé la vidéo précédente sur la configuration d'un projet Symfony, vous ne devriez pas être perdus (sinon, je vous invite à la regarder, bien évidemment) !</p>
<p>Le fichier doctrine.yaml est partagé en 2 parties :</p>
<p>DBAL, pour la configuration du &quot;dabatase abstraction layer&quot;, la partie qui gère la connexion à la BdD. Notez l'appel à une variable d'environnement, que nous allons mettre à jour dans un instant.</p>
<p>ORM pour la configuration de l'ORM... C'est-à-dire configurer le lien entre nos entités et les tables (nommage des tables, où il peut trouver les entités, etc.)</p>
<p>Comme vous vous en doutez, je reviendrai un peu plus tard sur le fichier doctrine_migrations</p>
<p>Donc, qu'avons-nous à modifier dans cette configuration. Théoriquement, rien !</p>
<p>En pratique, si on range nos entités ailleurs que dans src/Entity, il faudrait qu'on modifie ces lignes &quot;mappings&quot;, mais nous n'allons pas voir ce cas.</p>
<p>Et si on regarde plus haut, cette variable d'environnement doit être définie.</p>
<p>Allons donc dans notre fichier .env et regardons notre variable DATABASE_URL. Nous allons la mettre à jour pour une configuration basique de mysql, mais il faudra bien évidemment l'adapter à votre cas.</p>
<p>Cette variable se décompose en 5 parties :</p>
<p>L'identifiant de BdD (je vais mettre root), le mot de passe (je n'en ai pas), l'adresse de MySQL (127.0.0.1 convient bien, je suis sur ma machine), le port (3306 est standard) et le nom de la base de données (je vais l'appeler <code>test</code>).</p>
<p>Je précise que nous n'avons pas besoin de créer la BdD depuis un outil externe, nous allons le faire à l'aide d'une commande Symfony tout de suite.</p>
<p>La commande <code>php bin/console doctrine:database:create</code> permet de créer la base de données... Et de tester si notre connexion (et notre fichier .env) est bonne !</p>
<h2 id="cr%C3%A9er-une-entit%C3%A9">Créer une entité</h2>
<p>Maintenant que le lien avec notre BdD fonctionne, nous pouvons commencer à créer des entités !</p>
<p>Rappelez-vous qu'une classe va correspondre à une table de notre base, et les propriétés à une colonne.</p>
<p>De la même manière, un objet (une instance de cette classe), correspondra à une ligne dans cette table.</p>
<p>Pour créer une entité, nous pouvons utiliser une commande fournie par le MakerBundle : <code>make:entity</code>.</p>
<p>Elle nous permet à la fois de créer une entité, ou d'ajouter des propriétés à une entité existante.</p>
<p>C'est bien pratique et ça évite de faire le fichier &quot;à la main&quot; !</p>
<p>Créons d'abord une entité <code>Tag</code>.</p>
<p>Par défaut, elle va être rangée dans le dossier <code>src/Entity</code> et, pour le moment, ça va nous convenir.</p>
<p>Elle va avoir une seule propriété : un nom (name en anglais).</p>
<p>C'est une chaîne de caractères, que je vais arbitrairement limiter à 64 caractères.</p>
<p>Notez que, si je ne connais pas les types disponibles, je peux les demander au maker en entrant un point d'interrogation comme type.</p>
<p>Plus qu'à remplir.</p>
<p>Voilà ! Maintenant, allons jeter un œil à notre entité.</p>
<p>La première chose à voir, c'est qu'elle est truffée d'attributs commençant par &quot;ORM&quot;.</p>
<p>Nous en avons à la fois sur la classe et chacune des propriétés.</p>
<p>Il n'y en a actuellement pas sur les méthodes, car elles ne sont pas utiles à Doctrine, pour le moment.</p>
<p>Alors, à quoi servent ces attributs ?</p>
<p>Tout simplement à expliquer à Doctrine que notre classe est une entité,<br />
c'est-à-dire qu'il devra créer une table à partir de son nom et des colonnes depuis les différentes propriétés ayant un attribut ORM\Column.</p>
<p>Au niveau de la classe, l'attribut ORM\Entity définit non seulement que c'est une entité, mais définit également un paramètre &quot;repositoryClass&quot;.<br />
Nous reparlerons plus en détail des repositories, mais, pour faire simple, ce sont les services qui vont nous permettre de réaliser des requêtes de sélection pour cette entité.</p>
<p>On peut également ajouter un attribut ORM\Table, qui permet par exemple de nommer notre table nous-même, ou de définir une contrainte d'unicité sur la table.</p>
<p>Par exemple, nous pouvons déclarer que tous les noms de nos tags doivent être différents comme ceci.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-php"><span class="hljs-meta">#[ORM</span><span class="hljs-meta">\Table</span>(<span class="hljs-attr">uniqueConstraints</span>: [
    <span class="hljs-keyword">new</span> ORM\UniqueConstraint(<span class="hljs-attr">columns</span>: [<span class="hljs-string">&#x27;name&#x27;</span>]),
])<span class="hljs-meta">]</span>
</code></pre>
<p>Notez qu'il y a d'autres paramètres possibles pour ORM\Table, dont <code>name</code>, pour nommer vous-même la table. Dans mon cas, je laisse Doctrine gérer... Il devrait s'en sortir !</p>
<p>Quant aux propriétés, on a un attribut ORM\Column, dont le travail est de lier une propriété à une colonne de la table.</p>
<p>Si je veux définir moi-même les options de ma colonne, je peux :</p>
<p>Remplir le paramètre <code>name</code></p>
<p>En changer le type avec l'option <code>type</code>. Les différents types sont définis dans une constante Types de Doctrine, si vous voulez tous les voir.</p>
<p>Définir si la valeur peut être nulle ou non avec <code>nullable</code>. Par défaut, je vais la passer à <code>false</code> pour être sûr que le nom ne puisse pas être null.</p>
<p>Il y a pléthore d'autres paramètres, que l'on peut voir dans la définition de l'attribut, mais sur lesquels je ne vais pas m'étendre.</p>
<p>On en verra quelques exemples dans la partie &quot;pratique&quot;, pour qu'ils soient un peu concrets !</p>
<p>Dans tous les cas, notre entité a non seulement la propriété qu'on a demandée, mais aussi des méthodes associées (getter et setter).</p>
<h2 id="des-relations-entre-nos-entit%C3%A9s">Des relations entre nos entités</h2>
<p>Avoir une entité, c'est bien, mais la plupart du temps, nous avons une myriade d'entités, liées entre elles.</p>
<p>Créons donc une seconde entité <code>Article</code>, avec un titre, une description et des tags.</p>
<p>Le champ <code>title</code> va être de type <code>string</code>, de longueur 255 (valeur par défaut) et non <code>null</code>.</p>
<p>Le champ <code>content</code> va être de type <code>text</code> et non <code>null</code> aussi.</p>
<p>Maintenant, la pièce de résistance.</p>
<p>Nous voulons que notre entité <code>Article</code> puisse être associée à des tags.</p>
<p>On déclare une propriété tags. Notez le pluriel, vu que l'on veut avoir plusieurs tags liés à notre article.</p>
<p>C'est juste une convention, mais ça aide à s'y retrouver.</p>
<p>Pour le type, j'en ai 5 possibles, mais je vais entrer le plus pratique : &quot;relation&quot;.</p>
<p>Il me permet d'avoir une aide pour trouver le bon type de relation. Personnellement, je me mélange les pinceaux très souvent, donc cette aide ne m'est pas négligeable.</p>
<p>Je dois ensuite entrer l'entité à laquelle je veux me lier. J'entre donc <code>Tag</code>.</p>
<p>Ici, je veux une relation <code>ManyToMany</code>. Chaque tag est lié à plusieurs articles et chaque article à plusieurs tags.</p>
<p>J'admets, je n'ai pas choisi le cas le plus dur à deviner !</p>
<p>J'aurais même pu mettre le type <code>ManyToMany</code> dès le départ, à la place de &quot;relation&quot;.</p>
<p>Est-ce que je veux ajouter une propriété dans <code>Tag</code>, pour récupérer les articles ? Oui, ça me serait bien utile !</p>
<p>Avoir des relations bidirectionnelles dans nos entités ne changera rien au niveau de la BdD, c'est Doctrine qui va faire le travail, mais nous simplifiera la vie au quotidien.</p>
<p>Cette propriété s'appellera <code>articles</code> dans notre entité Tag.</p>
<p>Et voilà !</p>
<p>Allons voir nos entités.</p>
<p>Des deux côtés, nous avons des propriétés avec un attribut <code>ManyToMany</code> et un paramètre <code>targetEntity</code>, permettant de créer ce lien, aux yeux de Doctrine.</p>
<p>Côté <code>Tag</code>, nous avons un paramètre <code>mappedBy</code>, indiquant que la relation est définie dans l'autre entité (<code>Article</code>) et que celle-ci est le côté &quot;inverse&quot; de la relation.</p>
<p>Côté <code>Article</code>, le paramètre <code>inversedBy</code> indique qu'on est dans l'entité porteuse de la relation, et que <code>Tag</code> est l'inverse.</p>
<p>Concrètement, Doctrine va nous créer une table de relation <code>article_tag</code> dont l'ordre dans le nom est défini par le sens de la relation.</p>
<p>En général, ce sens nous importe peu, à part pour quelques maniaques comme moi.</p>
<h2 id="avoir-une-table-en-abbr-titlebase-de-donn%C3%A9esbddabbr">Avoir une table en <abbr title="Base de Données">BdD</abbr></h2>
<p>Bon, notre entité est bien belle, mais nous n'avons toujours pas de table dans notre base.</p>
<p>C'est normal, nous n'avons pas encore dit à Doctrine de le faire, ni comment le faire !</p>
<p>Pour ça, nous allons faire deux opérations : créer les requêtes SQL pour mettre à jour les tables et les champs, puis appliquer ces requêtes SQL.</p>
<p>Pourquoi ce fonctionnement ?</p>
<p>Pour pouvoir versionner ces changements. Autrement dit, tous les collaborateurs du projet pourront avoir le même schéma en appliquant ces requêtes, qu'on appelle des migrations.</p>
<p>Le but est ici d'avoir des versions du schéma de BdD de notre application pour, entre autre, mettre à jour notre production automatiquement, sans avoir à modifier manuellement la BdD.</p>
<p>Pour ce faire, commençons par la commande <code>bin/console make:migration</code>, pour créer notre première migration.</p>
<p>Cette commande regarde notre schéma de BdD, le compare avec celui attendu par nos entités et crée les requêtes nécessaires.</p>
<p>Si on regarde le fichier généré, son nom contient la date et l'heure de création de la migration et la classe contient 2 méthodes : up et down.</p>
<p>La méthode up permet d'appliquer nos modifications, alors que la méthode down nous permet de revenir en arrière.</p>
<p>Cette dernière est bien pratique si, par exemple, une fonctionnalité qu'on a mise en production ne fonctionne pas comme attendu et qu'on veut la supprimer.</p>
<p>Pour du code, il suffit de revenir en arrière de quelques commits, mais pour la BdD, les migrations permettent d'avoir un mécanisme similaire.</p>
<p>Vu que c'est notre première migration dans ce projet, nous avons quelques éléments supplémentaires, comme la création d'une table <code>messenger_messages</code>, dont nous parlerons bien plus tard !</p>
<p>Comment appeler cette méthode <code>up()</code> ?</p>
<p>Grâce à la commande <code>bin/console doctrine:migrations:migrate</code>, nous pouvons appeler les méthodes <code>up()</code> de <strong>toutes</strong> les migrations qui n'ont pas déjà été exécutées.</p>
<p>Parce que oui, Doctrine retient les migrations exécutées, dans la table <code>doctrine_migrations_version</code>.</p>
<p>Appliquons notre migration et jetons un œil à la BdD.</p>
<blockquote>
<p>Commit des changements en Off</p>
</blockquote>
<blockquote>
<p>Face caméra, avec PhpStorm derrière</p>
</blockquote>
<p>Et voilà !</p>
<p>Je vais en profiter pour insister sur un point important : pourquoi fait-on tout ça, juste pour mettre à jour notre BdD ?</p>
<p>Notre problème est en fait assez simple : une base de données n'est pas du code et n'est pas versionnée.</p>
<p>Les données vont et viennent et sont spécifiques à chaque machine qui fait tourner le projet.</p>
<p>Du coup, ces migrations nous permettent d'avoir des versions du schéma de la BdD, directement dans le code.</p>
<p>Comme ça, toute personne travaillant sur le projet peut accéder aux modifications des autres quand le besoin se fait sentir.</p>
<p>Bien sûr, cette méthode a des inconvénients.</p>
<p>Déjà, ça implique tout un protocole pour mettre à jour la BdD (modifier la ou les entités, créer une migration, la relire, l'exécuter).</p>
<p>Pour chaque nouvelle fonctionnalité, débug, etc. impliquant la BdD, nous allons avoir <strong>au moins</strong> une nouvelle migration.</p>
<p>Ce qui veut dire qu'elles vont s'accumuler et le dossier de migrations peut vite devenir un sacré capharnaüm !</p>
<p>Dans la partie pratique, nous verrons comment organiser nos fichiers. Ça sera fait automatiquement par le bundle, donc c'est plutôt efficace.</p>
<p>Ensuite, dès qu'on travaille à plusieurs, qu'on passe d'un ticket à l'autre et qu'on change de branche, il faut bien penser à l'état de notre BdD !</p>
<p>Par exemple, j'ai créé une migration dans cette branche. Si je reviens sur ma branche principale, je n'ai plus ma migration, mais ma BdD n'a pas été modifiée, elle.</p>
<p>J'ai donc une BdD qui ne correspond plus à ma branche principale, et ça peut être problématique.</p>
<p>Pour gérer ça, je vais retourner sur ma branche et annuler ma ou mes migrations avec la commande <code>bin/console doctrine:migrations:execute --down</code>, suivi du <abbr title="Fully Qualified Class Name">FQCN</abbr> de ma migration.</p>
<p>Dans mon cas, ça donne ça !</p>
<blockquote>
<p>Lancer la commande <code>bin/console doctrine:migrations:execute --down 'App\Migrations\VersionXXX'</code></p>
</blockquote>
<p>Et maintenant, je peux revenir sur ma branche principale avec beaucoup moins de problèmes.</p>
<p>J'en profite : la commande <code>doctrine:migrations:execute</code> peut être exécutée avec l'option <code>up</code> ou l'option <code>down</code>, selon si vous voulez appeler la méthode <code>up()</code> ou <code>down()</code> de votre migration.</p>
<p>Et cela a une autre implication : essayer de ne pas avoir trop de migrations dans une branche, si vous risquez de faire de tels allers et retours.</p>
<p>Personnellement, j'essaie de n'avoir qu'une migration max par branche. C'est nettement plus pratique !</p>
<p>Nous verrons d'ailleurs comment gérer ce cas dans la partie pratique.</p>
<h2 id="manipuler-des-donn%C3%A9es">Manipuler des données</h2>
<blockquote>
<p>Avoir inséré des données random dans la base (tags + articles)</p>
</blockquote>
<blockquote>
<p>Face caméra, avec slides derrière</p>
</blockquote>
<p>Fiou ! Le schéma, c'est bon !</p>
<p>Maintenant, revenons (enfin) à du code, pour ajouter des lignes dans nos tables !</p>
<p>Dans un premier temps, je vais tester tout ça directement dans un controller.</p>
<p>C'est pas le plus propre, mais vous verrez mieux l'idée.</p>
<p>Dans la partie pratique, nous verrons un exemple plus propre et courant.</p>
<p>Pendant la création des entités, vous avez sûrement remarqué que Symfony nous a créé non seulement une entité dans <code>src/Entity</code>, mais aussi un repository dans <code>src/Repository</code>.</p>
<p>Ces repositories servent à récupérer les entités d'un type à la fois.</p>
<p>Mon ArticleRepository pour gérer les entités d'article, TagRepository pour les tags.</p>
<p>Ce sont des services, que nous allons donc pouvoir appeler dans notre controller.</p>
<p>Petite parenthèse, si vous ne savez pas ce que sont les services dans Symfony, je vous renvoie sur ma vidéo précédente, juste là.</p>
<blockquote>
<p>Lien vers la vidéo précédente à mettre dans les fiches.</p>
</blockquote>
<p>Je crée quelques objets Tag et Article, avec des données bidons.</p>
<blockquote>
<p>Créer 4 objets Tag et 2 articles, pour bien remplir les tables et améliorer la récupération</p>
</blockquote>
<p>Si je charge ma page, aucune entrée n'a été ajoutée en base. C'est normal, nous ne lui avons pas dit de sauvegarder.</p>
<p>Pour faire ça, j'injecte le service EntityManagerInterface.</p>
<p>Il dispose de 2 méthodes <code>persist()</code> et <code>flush()</code> pour sauvegarder n'importe quel type d'entité.</p>
<p><code>persist()</code> permet de dire à Doctrine qu'on voudra sauvegarder l'entité qu'on passe en paramètre, de préciser ce que l'on veut sauvegarder.</p>
<p><code>flush()</code> lui dit de faire la sauvegarde, d'exécuter réellement les requêtes.</p>
<p>Je fais toujours le parallèle entre <code>persist()</code> et la commande <code>add</code> de Git, alors que <code>flush()</code> serait la commande <code>commit</code>.</p>
<p>Du coup, il faut bien préciser à Doctrine tout ce que je veux sauvegarder, et je flush à la fin, pour qu'il passe toutes les requêtes en une fois.</p>
<p>En cas de pépin, rien ne sera sauvegardé, ce qui n'est peut-être pas plus mal.</p>
<p>Si je recharge ma page... Tout a l'air de marcher et mes données sont bien enregistrées.</p>
<p>Avant de vous parler de la suppression, voyons comment récupérer nos données.</p>
<p>Comme je le disais plus tôt, nous allons utiliser les repositories pour le faire.</p>
<p>Prenons la page d'accueil de notre blog, où nous aimerions voir tous les articles.</p>
<p>Pour ça, nous pouvons injecter notre ArticleRepository et utiliser ses différentes méthodes.</p>
<p><strong>Tous</strong> les repositories ont 4 méthodes de base :</p>
<ul>
<li>
<p><code>find()</code>, pour récupérer un élément par son identifiant (encore faut-il l'avoir)</p>
</li>
<li>
<p><code>findAll()</code> pour récupérer toutes les entités d'un type</p>
</li>
<li>
<p><code>findOneBy()</code> pour récupérer <strong>une seule</strong> entrée selon un ensemble de critères</p>
</li>
<li>
<p><code>findBy()</code> pour récupérer <strong>un tableau</strong> d'entrées selon un ensemble de critères</p>
</li>
</ul>
<p>Contentons-nous d'utiliser la méthode <code>findAll()</code> pour tout récupérer. Dans la partie pratique, nous verrons plus avant les autres méthodes et leur utilisation.</p>
<blockquote>
<p>Charger la page d'accueil avec un dd() sur les résultats</p>
</blockquote>
<p>Nous récupérons bien nos différentes entités, avec leurs propriétés.</p>
<p>Notez bien que les entités liées, comme notre propriété <code>tags</code>, ne sont pas initialisées par défaut, et la collection va nous sembler bien vide !</p>
<p>C'est lié à un comportement de Doctrine, qui ne charge les autres entités que lors de leur utilisation.</p>
<p>Dans notre application, nous verrons que nous pourrons bel et bien nous en servir directement, pas besoin de faire d'autres requêtes, c'est Doctrine qui s'en chargera discrètement.</p>
<p>Dans notre exemple, si je récupère un article lié à 10 tags, j'aurais potentiellement 1 requête pour récupérer mon article, puis 10 requêtes pour récupérer chacun des tags.</p>
<p>Soit 11 requêtes, quand même !</p>
<p>Dans la partie pratique, nous essaierons de réduire le nombre de requêtes de la page et verrons en détails comment ça se passe.</p>
<blockquote>
<p>Afficher la page, regarder le profiler</p>
</blockquote>
<p>J'en profite pour mentionner le profiler, qui a toute une partie Doctrine, pour nous montrer exactement ce qu'il se passe en interne.</p>
<p>Ce panneau présente les différentes requêtes, leur durée, etc.</p>
<p>Très pratique pour bien tout comprendre !</p>
<blockquote>
<p>Ouvrir le TagRepository, créer une requête pour récupérer tous les tags ayant au moins un article</p>
</blockquote>
<p>Pour réaliser des requêtes plus complexes, nous allons pouvoir créer de nouvelles méthodes dans notre repository.</p>
<p>Ce sont ces méthodes que nous appellerons dans nos différents services pour exécuter les requêtes.</p>
<p>Prenons un exemple : nous voulons créer une requête permettant de récupérer tous les tags associés à <strong>au moins</strong> un article.</p>
<p>Nous allons créer une méthode, que nous pouvons nommer comme bon nous semble...</p>
<p>Disons... <code>findWithArticles()</code>, qui nous retournera un tableau de tags.</p>
<p>Pour ça, je vais utiliser un QueryBuilder, c'est-à-dire un objet de construction de requête.</p>
<p>Cet objet ne construit pas une requête SQL, mais utilise un sous-langage, le DQL, pour Doctrine Query Language, qui se base sur nos <strong>classes</strong> pour construire ensuite la requête SQL.</p>
<p>Tout d'abord, créons notre QueryBuilder avec la méthode <code>createQueryBuilder()</code> du repository.</p>
<p>Elle attend un paramètre : un alias pour l'entité que l'on recherche.</p>
<p>Disons <code>t</code>, c'est difficile de faire plus court !</p>
<blockquote>
<p>Afficher la complétion sur le QueryBuilder<br />
Fiche : <a href="https://www.doctrine-project.org/projects/doctrine-orm/en/2.16/reference/query-builder.html#high-level-api-methods">https://www.doctrine-project.org/projects/doctrine-orm/en/2.16/reference/query-builder.html#high-level-api-methods</a></p>
</blockquote>
<p>On a alors accès à de nombreuses méthodes, comme <code>select()</code>, <code>andWhere()</code>, <code>having()</code>, etc. qui vont nous permettre de construire une requête cohérente.</p>
<blockquote>
<p>Écrire la requête en entier</p>
</blockquote>
<p>Ici, je crée une requête pour mon entité <code>t</code>, où la jointure avec un <code>innerJoin()</code> se fait sur <code>t.articles</code>, soit la propriété articles, contenue dans <code>Tag</code>.</p>
<p>Vous voyez que je m'abstrais totalement des tables ici.</p>
<p>Qu'il y ait une table de jointures ou non m'importe peu, je suis seulement les propriétés de mon entité.</p>
<p>Nous en verrons un peu plus dans la partie pratique, encore une fois, et je vous renvoie vers les documentations que vous trouverez dans les fiches, en attendant.</p>
<h2 id="des-entit%C3%A9s-et-des-routes">Des entités et des routes</h2>
<blockquote>
<p>PhpStorm, sur l'action d'affichage d'un article</p>
</blockquote>
<p>Une petite &quot;astuce&quot; bien pratique : vous pouvez demander à Doctrine d'aller chercher une entité, en fonction des paramètres de votre route.</p>
<p>Si j'ai un identifiant en paramètre de ma route, je peux le récupérer dans les paramètres de mon action et appeler la méthode <code>find()</code> de mon repository, ou demander à Doctrine d'aller la chercher, comme ceci.</p>
<p>C'est ce qu'on appelle l'EntityValueResolver !</p>
<p>Pour faire simple, si les paramètres de votre route correspondent aux propriétés de l'entité demandée, Doctrine va appeler la méthode <code>findOneBy()</code> du repository pour aller chercher l'entité.</p>
<p>Dans cet exemple, on a une correspondance entre le paramètre <code>id</code> et la propriété <code>id</code>, donc Doctrine va chercher un article ayant l'identifiant présent dans l'url.</p>
<p>Pratique et puissant, n'est-ce pas ?</p>
<p>Si vous avez besoin d'une expression plus complexe, vous pouvez utiliser l'attribut <code>MapEntity</code> pour personnaliser le comportement.</p>
<blockquote>
<p>fiche : <a href="https://symfony.com/doc/current/doctrine.html#fetch-via-an-expression">https://symfony.com/doc/current/doctrine.html#fetch-via-an-expression</a></p>
</blockquote>
<p>La documentation montre comment s'en servir et nous attendrons d'avoir un cas pratique pour approfondir le sujet !</p>
<h2 id="%C3%A9tendre-doctrine-dans-symfony">Étendre Doctrine dans Symfony</h2>
<blockquote>
<p>Ouvrir dans 2 onglets les deux documentations :</p>
<ul>
<li><a href="https://symfony.com/bundles/StofDoctrineExtensionsBundle/current/index.html">StofDoctrineExtensionsBundle</a></li>
<li><a href="https://github.com/beberlei/DoctrineExtensions">beberlei/DoctrineExtensions</a></li>
</ul>
</blockquote>
<blockquote>
<p>Ouvrir <a href="https://symfony.com/bundles/StofDoctrineExtensionsBundle/current/index.html">StofDoctrineExtensionsBundle</a></p>
</blockquote>
<p>Nos entités vont avoir des comportements assez récurrents, et les coder à chaque fois peut être assez frustrant.</p>
<p>Pour ça, il existe un bundle -- Stof Doctrine Extensions Bundle -- fournissant les outils nécessaires, sans avoir besoin de tout refaire soit-même.</p>
<p>Deux comportements reviennent dans beaucoup de projets :</p>
<ul>
<li>Sluggable, qui permet de convertir un texte quelconque en un texte valide pour une url</li>
<li>Timestampable, qui permet de retenir une date de création et/ou de modification d'une entité</li>
</ul>
<p>Nous implémenterons ces deux cas dans la partie pratique, bien sûr !</p>
<p>Il y en a bien sûr plein d'autres, que je vous laisserai découvrir.</p>
<p>Attention toutefois, la configuration de ce bundle n'est pas toujours aisée, et la documentation n'aide pas forcément...</p>
<blockquote>
<p>Ouvrir <a href="https://github.com/beberlei/DoctrineExtensions">beberlei/DoctrineExtensions</a></p>
</blockquote>
<p>Un autre bundle que j'utilise beaucoup moins, beberlei/DoctrineExtensions. Lui permet d'appeler des fonctions natives, mais <strong>spécifiques</strong> de votre base de données.</p>
<p>Doctrine se concentre sur les éléments communs, et son travail est de s'abstraire du système de BdD derrière.</p>
<p>Du coup, de nombreuses fonctions utiles ne sont pas disponibles.</p>
<p>Personnellement, j'évite d'utiliser ce genre d'astuces, pour conserver une certaine souplesse et éviter de me coincer complètement avec un système précis.</p>
<p>Sachez toutefois qu'il existe et peut vous permettre de mieux exploiter votre BdD.</p>
<h2 id="et-voil%C3%A0">Et voilà !</h2>
<p>Vous avez pu le voir, Doctrine est complet, complexe et nécessite un peu de pratique pour être maîtrisé.</p>
<p>Par contre, son travail est de nous simplifier la vie, sur le long terme.</p>
<p>Il nous permet de ne plus avoir à penser en termes de BdD, mais seulement d'objets PHP, avec des compositions, des héritages, etc.</p>
<p>Bon, il faut quand même se rappeler comment faire des requêtes SQL, ne serait-ce que pour le QueryBuilder et les migrations...</p>
